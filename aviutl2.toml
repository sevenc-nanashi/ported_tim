#:schema ./.aviutl2-cli/aviutl2.schema.json
# 設定ファイルについては https://github.com/sevenc-nanashi/aviutl2-cli を参照してください。

[project]
id = "sevenc-nanashi.ported_tim"
name = "ported_tim"
version = "0.1.0"

[build_group]
aulua = "aulua build"

[development]
aviutl2_version = "latest"
catalog_dependencies = ["sevenc-nanashi.aviutl2-rs.rusty_image_rs_input", "sevenc-nanashi.aviutl2-rs.rusty_scripts_search", "sevenc-nanashi.clipboard-aux2", "sigma-axis.Basic_S"]

[preview]
aviutl2_version = "latest"
catalog_dependencies = ["sevenc-nanashi.aviutl2-rs.rusty_image_rs_input", "sevenc-nanashi.aviutl2-rs.rusty_scripts_search", "sevenc-nanashi.clipboard-aux2", "sigma-axis.Basic_S"]

[release]
prebuild = ["cargo about generate ./about.hbs -o ./release/package.txt"]
package_template = "./release/package.txt"

[catalog]
id = "sevenc-nanashi.ported_tim"
license_path = "./LICENSE"
download_repo = { owner = "sevenc-nanashi", repo = "ported_tim" }

[artifacts.tim2-mod2]
destination = "Script/tim2.mod2"

[artifacts.tim2-mod2.profiles.debug]
build = "cargo build -p ported_tim"
source = "target/debug/ported_tim.dll"

[artifacts.tim2-mod2.profiles.release]
build = "cargo build --release -p ported_tim"
source = "target/release/ported_tim.dll"

[artifacts.tim2_anm2]
build = { group = "aulua" }
source = "build/@tim.anm2.anm2"
destination = "Script/@tim.anm2.anm2"

[artifacts.tim2_obj2]
build = { group = "aulua" }
source = "build/@tim.obj2.obj2"
destination = "Script/@tim.obj2.obj2"

[artifacts.tim2_tra2]
build = { group = "aulua" }
source = "build/@tim.tra2.tra2"
destination = "Script/@tim.tra2.tra2"

[artifacts.tim2_cam2]
build = { group = "aulua" }
source = "build/@tim.cam2.cam2"
destination = "Script/@tim.cam2.cam2"

[artifacts.tim2_scn2]
build = { group = "aulua" }
source = "build/@tim.scn2.scn2"
destination = "Script/@tim.scn2.scn2"

[artifacts.tim2_English_aul2]
build = "rake i18n:build"
source = "build/English.ported_tim.aul2"
destination = "Language/English.ported_tim.aul2"

# Debug

[artifacts.English_aul2]
source = "https://github.com/aviutl2/aviutl2_community_translation/raw/main/locales/community_en.aul2"
destination = "Language/English.aul2"
profiles.release.enabled = false

[artifacts.mcp_agent]
destination = "Plugin/mcp_agent.aux2"
build = "cargo build -p ported_tim_tester"
source = "target/debug/ported_tim_tester.dll"
profiles.release.enabled = false
